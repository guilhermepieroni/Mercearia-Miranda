<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" width="640" height="320">
  <defs>
    <linearGradient id="bgcombo4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="60%" style="stop-color:#1a1008"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <linearGradient id="accentcombo4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#b91c1c"/>
    </linearGradient>
    <radialGradient id="glowcombo4" cx="60%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0"/>
    </radialGradient>
    <filter id="blurcombo4">
      <feGaussianBlur stdDeviation="32"/>
    </filter>
    <clipPath id="clipcombo4">
      <rect width="640" height="320" rx="20"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="640" height="320" rx="20" fill="url(#bgcombo4)"/>
  <rect width="640" height="320" rx="20" fill="url(#glowcombo4)"/>
  <clipPath id="clipcombo4"><rect width="640" height="320" rx="20"/></clipPath>

  <!-- Decorative circles -->
  <circle cx="560" cy="40" r="120" fill="rgba(255,255,255,0.025)" clip-path="url(#clipcombo4)"/>
  <circle cx="80" cy="280" r="90" fill="rgba(255,255,255,0.02)" clip-path="url(#clipcombo4)"/>

  <!-- Border -->
  <rect x="1" y="1" width="638" height="318" rx="19" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="640" height="4" rx="2" fill="url(#accentcombo4)"/>

  <!-- Tag pill -->
  <rect x="24" y="22" width="150" height="26" rx="13" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="99" y="39" text-anchor="middle" font-size="11" fill="#ef4444" font-family="Arial" font-weight="700" letter-spacing="0.5">CHAMA O PESSOAL</text>

  <!-- Title -->
  <text x="24" y="82" font-size="36" fill="white" font-family="Arial Black, Arial" font-weight="900" letter-spacing="-0.5">KIT CHURRASCO</text>

  <!-- Desc -->
  <text x="24" y="108" font-size="13" fill="rgba(255,255,255,0.55)" font-family="Arial">Brahma 600ml x6 + Skol Lata x6 + Amendoim + Carvão</text>

  <!-- Divider -->
  <line x1="24" y1="124" x2="220" y2="124" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Items area -->
  
        <g transform="translate(150,180)">
          <circle r="62" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
          <circle r="54" fill="rgba(255,255,255,0.04)"/>
          <text x="0" y="10" text-anchor="middle" font-size="38">🍺</text>
          <text x="0" y="80" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.6)" font-family="Arial">Brahma 600ml x6</text>
        </g>
        <g transform="translate(280,150)">
          <circle r="54" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
          <circle r="46" fill="rgba(255,255,255,0.04)"/>
          <text x="0" y="10" text-anchor="middle" font-size="33">🥜</text>
          <text x="0" y="72" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.6)" font-family="Arial">Skol Lata x6</text>
        </g>
        <g transform="translate(380,160)">
          <circle r="54" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
          <circle r="46" fill="rgba(255,255,255,0.04)"/>
          <text x="0" y="10" text-anchor="middle" font-size="33">🔥</text>
          <text x="0" y="72" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.6)" font-family="Arial">Amendoim</text>
        </g>
        <g transform="translate(490,185)">
          <circle r="54" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
          <circle r="46" fill="rgba(255,255,255,0.04)"/>
          <text x="0" y="10" text-anchor="middle" font-size="33">🍖</text>
          <text x="0" y="72" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.6)" font-family="Arial">Carvão</text>
        </g>

  <!-- Bottom bar -->
  <rect x="0" y="268" width="640" height="52" rx="0" fill="rgba(0,0,0,0.35)" clip-path="url(#clipcombo4)"/>
  <rect x="0" y="268" width="640" height="1" fill="rgba(255,255,255,0.06)"/>

  <!-- Price -->
  <text x="24" y="302" font-size="28" fill="url(#accentcombo4)" font-family="Arial Black, Arial" font-weight="900">R$ 89,90</text>

  <!-- Savings badge -->
  <rect x="130" y="280" width="150" height="26" rx="13" fill="#ef4444" opacity="0.18"/>
  <rect x="130" y="280" width="150" height="26" rx="13" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.4"/>
  <text x="205" y="297" text-anchor="middle" font-size="11" fill="#ef4444" font-family="Arial" font-weight="700">Economize R$ 15,00</text>

  <!-- CTA -->
  <rect x="490" y="274" width="130" height="36" rx="18" fill="url(#accentcombo4)"/>
  <text x="555" y="296" text-anchor="middle" font-size="13" fill="#0d0d0d" font-family="Arial" font-weight="700">PEDIR AGORA</text>
</svg>